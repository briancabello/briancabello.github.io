<section id="skills" class="py-5">
  <div class="container">
    
    <div class="mb-5">
      <div class="text-uppercase small text-success fw-bold mb-1">Technical Proficiency</div>
      <h2>
        <span class="border-bottom border-3 border-success pb-2">
          Skills &amp; Expertise
        </span>
      </h2>
    </div>

    <!-- ICON STRIP -->
    <div class="row justify-content-center mb-5">
      <div class="col-lg-10">
        <div class="d-flex flex-wrap justify-content-center align-items-center gap-4 py-4">
          {{#each techIcons}}
          <div class="tech-strip-icon" title="{{alt}}">
            <img
              src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/{{icon}}/{{icon}}-original.svg"
              width="52"
              height="52"
              alt="{{alt}}"
              loading="lazy"
              style="object-fit: contain;"
              onerror="this.onerror=null; this.src='https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/{{icon}}/{{icon}}-plain.svg';"
            />
          </div>
          {{/each}}
        </div>
      </div>
    </div>

    <!-- EXPERTISE CARDS -->
    <div class="row g-4 justify-content-center">
      {{#each expertise}}
      <div class="col-md-6 col-lg-4">
        <div class="text-center px-3 py-4">
          <div class="expertise-icon-circle mx-auto mb-3">
            <i class="{{icon}} fa-lg"></i>
          </div>
          <h5 class="fw-bold text-body-emphasis mb-3">{{title}}</h5>
          <p class="text-body-secondary small mb-0">{{description}}</p>
        </div>
      </div>
      {{/each}}
    </div>

  </div>
</section>

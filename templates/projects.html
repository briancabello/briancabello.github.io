<section id="projects" class="py-5">
  <div class="container">
    
    <div class="section-head mb-5">
      <div class="section-eyebrow">
        <span class="num">03</span>
        <span class="bar"></span>
        Projects
      </div>
      <h2 class="section-title">Featured <span class="accent">solutions.</span></h2>
    </div>

    <div class="row g-4">
      {{#each projects}}
      <div class="col-md-6">
        
        <div class="project-showcase mb-3">
          
          {{#if image}}
          <a href="{{#if id}}?project={{id}}{{else}}#{{/if}}" class="d-block project-img-wrapper rounded-3 overflow-hidden mb-3">
            <img src="{{image}}" class="w-100 h-100 object-fit-cover" alt="{{title}}" loading="lazy">
          </a>
          {{else}}
          <a href="{{#if id}}?project={{id}}{{else}}#{{/if}}" class="d-block project-placeholder rounded-3 overflow-hidden mb-3 d-flex flex-column align-items-center justify-content-center text-decoration-none">
            <i class="fas fa-code text-success opacity-25 fa-3x mb-2"></i>
            {{#if status}}
            <span class="badge rounded-pill bg-success bg-opacity-10 text-success border border-success border-opacity-25 px-2 py-1" style="font-size: 0.7rem;">
              {{status}}
            </span>
            {{/if}}
          </a>
          {{/if}}

          <div class="d-flex align-items-center gap-2 mb-2">
            <h4 class="fw-bold text-body-emphasis mb-0">{{title}}</h4>
            {{#if id}}
            <a href="?project={{id}}" class="text-success" aria-label="View {{title}} details">
              <i class="fas fa-arrow-up-right-from-square small"></i>
            </a>
            {{/if}}
          </div>

          <p class="text-body-secondary mb-0">{{description}}</p>

        </div>

      </div>
      {{/each}}
    </div>
  </div>
</section>
